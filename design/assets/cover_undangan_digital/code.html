<!doctype html>

<html class="dark" lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Undangan Pernikahan - Juliana &amp; Muhammad</title>

    <link

      rel="stylesheet"
    />

              'outline-muted': '#4D4635',
              'on-secondary-fixed': '#1c1b1c',
              'secondary-fixed-dim': '#c8c6c7',
              'on-background': '#eae1d4',
              'on-tertiary-container': '#454546',
              'outline-variant': '#4d4635',
              'on-primary-fixed': '#241a00',
              'on-tertiary-fixed-variant': '#464748',
              'primary-container': '#d4af37',
              'surface-dim': '#16130b',
              'on-primary-fixed-variant': '#574500',
              'outline': '#99907c',
              'tertiary-container': '#b3b2b3',
              'error': '#ffb4ab',
              'on-error': '#690005',
              'on-tertiary': '#303031',
              'on-secondary': '#313031',
              'primary-fixed': '#ffe088',
              'gold-gradient-start': '#D4AF37',
              'surface-container-lowest': '#110e07',
              'surface-container-low': '#1f1b13',

              'on-error-container': '#ffdad6',
              'inverse-on-surface': '#343027',
              'primary': '#f2ca50',
              'tertiary': '#cfcecf',
              'surface-container-highest': '#38342b',
              'secondary-fixed': '#e5e2e3',
              'surface-container': '#231f17',
              'surface-bright': '#3d392f',
              'inverse-primary': '#735c00',
              'on-primary': '#3c2f00',
              'surface-container-high': '#2d2a21',

              'gold-gradient-mid': '#99907C',

            borderRadius: {

              xl: '0.5rem',
              full: '0.75rem',
            },
            spacing: {
              'container-max': '480px',
              'edge-margin': '1.5rem',
              'stack-md': '1rem',
              'section-gap': '6rem',
              'stack-lg': '2rem',
              'stack-sm': '0.5rem',
            },

            },

          },
        },
      }
    </script>
    <style>
      @keyframes pulse-gold {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(242, 202, 80, 0.4);
        }
        50% {
          box-shadow: 0 0 0 10px rgba(242, 202, 80, 0);
        }
      }
      .animate-pulse-gold {
        animation: pulse-gold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .mega-mendung-mask {
        mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
      }
      .slide-up {
        animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUp {
        from {
          transform: translateY(30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container overflow-hidden"
  >
    <!-- Mobile Wrapper Shell -->
    <main
      class="relative w-full max-w-container-max mx-auto h-screen bg-surface shadow-2xl overflow-hidden flex flex-col items-center justify-between py-12 px-edge-margin"
    >
      <!-- Heritage Ornament (Mega Mendung) -->
      <div class="absolute top-0 left-0 w-full opacity-30 mega-mendung-mask pointer-events-none">
        <img
          alt="Mega Mendung Pattern"
          class="w-full h-auto object-cover grayscale brightness-50 contrast-150"
          data-alt="A macro detail of a traditional Javanese Mega Mendung batik pattern, rendered in a sophisticated gold and charcoal palette. The flowing, cloud-like geometric shapes are captured with an editorial, high-contrast aesthetic, featuring subtle metallic reflections that suggest premium luxury and cultural heritage. The lighting is moody and dramatic, emphasizing the intricate linework of the heritage design."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYRScMxcfXFNVetEATDrpWNOfgJWoX26YaK9Rs9FHrbaT5yj4BYd7O5Rskkh9g0UUWb_QlyCcOuawsxfjKHhY5oZ5EFSjBOFccJiZJkbBO_is6ZiuhXo8sVDAQEoxdRVpTRJjEUm0-Dkz-oD5oBmqmTJQI1vhtvYYIZLJHg2nvYG-GsNvtWjynm26EUg461XHn9H8KZ6IqfBtBgWpDZ0zXdnfcMS5cmcjOrKe9WAwfZb_oIuxyBSDPoqANlKhjaOz-oBc84VBSwAs"
        />
      </div>
      <!-- Decorative Divider -->
      <div
        class="z-10 w-16 h-0.5 bg-primary opacity-40 mb-8 slide-up"
        style="animation-delay: 0.1s"
      ></div>
      <!-- Header Content -->
      <div
        class="z-10 text-center space-y-stack-md flex-grow flex flex-col justify-center slide-up"
        style="animation-delay: 0.3s"
      >
        <p class="font-label-caps text-label-caps text-primary tracking-[0.5em] mb-4">
          UNDANGAN PERNIKAHAN
        </p>
        <div class="space-y-2">
          <h1 class="font-display-hero text-display-hero text-on-surface">Juliana</h1>
          <span class="font-headline-md text-headline-md text-primary">&amp;</span>
          <h1 class="font-display-hero text-display-hero text-on-surface">Muhammad</h1>
        </div>
        <div class="pt-12 pb-8 space-y-stack-sm">
          <p class="font-body-md text-body-md text-on-surface-variant italic">
            Kepada Yth. Bapak/Ibu/Saudara/i
          </p>
          <h2 class="font-headline-md text-headline-md text-on-surface tracking-wide mt-2">
            Nama Tamu
          </h2>
        </div>
      </div>
      <!-- Call to Action Section -->
      <div class="z-10 w-full slide-up" style="animation-delay: 0.6s">
        <button
          class="group relative w-full bg-primary hover:bg-primary-fixed transition-all duration-500 py-5 rounded-lg flex items-center justify-center gap-3 overflow-hidden animate-pulse-gold"
          id="openInvitation"
        >
          <!-- Button Background Shine Effect -->
          <div
            class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"
          ></div>
          <span class="material-symbols-outlined text-on-primary text-[20px]">mail</span>
          <span class="font-label-caps text-label-caps text-on-primary text-[12px]"
            >Buka Undangan</span
          >
        </button>
        <p
          class="mt-6 font-body-md text-body-md text-on-surface-variant/60 text-center tracking-[0.2em]"
        >
          EST. 2024
        </p>
      </div>
      <!-- Background Atmospheric Element (Gunungan Silhouette) -->
      <div
        class="absolute bottom-[-10%] right-[-10%] opacity-10 pointer-events-none w-64 rotate-12"
      >
        <span
          class="material-symbols-outlined text-[300px] text-primary"
          style="font-variation-settings: 'FILL' 1"
          >temple_hindu</span
        >
      </div>
    </main>
    <!-- Hidden Main Content Placeholder (For structural completeness) -->
    <div class="hidden fixed inset-0 z-[100] bg-surface overflow-y-auto" id="mainContent">
      <!-- Main invitation content would transition here -->
    </div>
    <script>
      document.getElementById('openInvitation').addEventListener('click', function () {
        // Haptic feedback simulation
        if (window.navigator.vibrate) {
          window.navigator.vibrate(50)
        }

        // Simple transition effect
        const mainShell = document.querySelector('main')
        mainShell.style.transition = 'all 1s cubic-bezier(0.16, 1, 0.3, 1)'
        mainShell.style.transform = 'translateY(-100%)'
        mainShell.style.opacity = '0'

        setTimeout(() => {
          // In a real app, we would reveal the scrollable content
          alert('Membuka Undangan...')
          window.scrollTo(0, 0)
        }, 800)
      })

      // Atmospheric parallax effect
      document.addEventListener('mousemove', (e) => {
        const moveX = (e.clientX - window.innerWidth / 2) / 50
        const moveY = (e.clientY - window.innerHeight / 2) / 50

        const background = document.querySelector('.mega-mendung-mask')
        if (background) {
          background.style.transform = `translate(${moveX}px, ${moveY}px)`
        }
      })
    </script>
  </body>
</html>
