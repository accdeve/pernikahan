    >

        <span class="material-symbols-outlined text-primary">menu</span>
      </div>
      <h1 class="font-headline-md text-headline-md text-primary tracking-tight">J &amp; M</h1>
      <div class="w-6"></div>
      <!-- Spacer for center alignment -->

      <!-- Section Header -->

                src="https://lh3.googleusercontent.com/aida-public/AB6AXuB-fynMPqG_cghiPPkVAbYiv34mTHoTmZCtGGG-gO9veJzEk6GXPTEkx6AHzrErCp5Dhz26TXKHG4BV5KPhnjctkaNkhejLXTmIAOjrXLBKdq1mXVzxl36VCVm1V84dqQWHIVq7izHSfMhvgl0MeeRI7riC9ltfmA9lbSYNNedts2qFbCSlDGsdKkgemF2880oXiLMcdO65JYJS4dgXohzePJFdm6aIzHETdH5R0hvj7cDyHXPm1Scc6vOUNw30chVgeQFnDxvxkmU"

      <!-- Decorative Footer Accent -->

    <!-- Bottom Navigation Bar -->

    >
      <!-- Home -->
      <button

      >
        <span class="material-symbols-outlined">home</span>
        <span class="font-label-caps text-[9px] uppercase tracking-widest mt-1">Home</span>
      </button>
      <!-- Couple -->

      >

      </button>

      >

      </button>

        class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-primary transition-all active:scale-90 duration-300"
      >
        <span class="material-symbols-outlined">mail</span>
        <span class="font-label-caps text-[9px] uppercase tracking-widest mt-1">RSVP</span>
      </button>

    <script>
      // Micro-interaction for gallery items appearing
      document.addEventListener('DOMContentLoaded', () => {
        const items = document.querySelectorAll('.gallery-item')
        items.forEach((item, index) => {
          item.style.opacity = '0'
          item.style.transform = 'translateY(20px)'
          setTimeout(() => {
            item.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)'
            item.style.opacity = '1'
            item.style.transform = 'translateY(0)'
          }, 150 * index)
        })
      })
    </script>
